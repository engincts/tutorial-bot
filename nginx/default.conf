upstream api_backend {
    server api:8005;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # ── API proxy ──────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;
    }

    # ── Health check (direct pass) ─────────────────
    location /health {
        proxy_pass http://api_backend/health;
    }

    location /healthz {
        proxy_pass http://api_backend/healthz;
    }

    location /readyz {
        proxy_pass http://api_backend/readyz;
    }

    location /metrics {
        proxy_pass http://api_backend/metrics;
        # Production'da bu endpoint'i IP ile kısıtla:
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Frontend static files ──────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Security headers ───────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;

    # ── Rate limiting zone ─────────────────────────
    # (nginx.conf'un http bloğuna ekle: limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;)
    # location /api/ { limit_req zone=api burst=20 nodelay; }

    # ── Gzip ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── File upload limit ──────────────────────────
    client_max_body_size 15m;
}

